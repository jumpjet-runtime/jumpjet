[project]
type = "game"
version = "0.1.0"
author = ""

[runtime]
version = "{{ runtime_version }}"

# The client/singleplayer component: renders and runs on each player's machine.
[client.build]
pre = "cargo build -p client --target wasm32-wasip2"
entrypoint = "./target/wasm32-wasip2/debug/client.wasm"
# assets = "./assets" # Optional: data files shipped with your game (mounted as local storage)
output = "./bin" # Jumpjet's build output

# The authoritative headless server component. Run it with `jumpjet run --server`.
[server.build]
pre = "cargo build -p server --target wasm32-wasip2"
entrypoint = "./target/wasm32-wasip2/debug/server.wasm"

[bundle]
name = "{{ name }}"
identifier = "{{ identifier }}"
# icon = "./icon.png" # Optional: app icon (PNG), converted to each platform's native format
