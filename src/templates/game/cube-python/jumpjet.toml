[project]
type = "game"
version = "0.1.0"
author = ""

[runtime]
version = "{{ runtime_version }}"

[client.build]
pre = "componentize-py -d .jumpjet/wit -w game componentize game -o game.wasm"
entrypoint = "./game.wasm" # The built wasm component to package
# assets = "./assets" # Optional: data files shipped with your game (mounted as local storage)
output = "./bin"

[bundle]
name = "{{ name }}"
identifier = "{{ identifier }}"
