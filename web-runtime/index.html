<!doctype html>
<html>

    <meta charset="utf-8" />
    <title>Jumpjet</title>
    <script type="importmap">
      {
        "imports": {
          "@bytecodealliance/preview2-shim": "./shim/lib/browser/index.js"
        }
      }

    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
        color: #ddd;
        font: 13px monospace;

      #jumpjet-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
